# Server Port Configuration
server.port=${PORT:8080}

# MongoDB Connection Configuration
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:${SPRING_MONGODB_URI:${MONGODB_URI}}}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:${SPRING_MONGODB_DATABASE:${MONGODB_DATABASE}}}
spring.mongodb.uri=${SPRING_MONGODB_URI:${SPRING_DATA_MONGODB_URI:${MONGODB_URI}}}
spring.mongodb.database=${SPRING_MONGODB_DATABASE:${SPRING_DATA_MONGODB_DATABASE:${MONGODB_DATABASE}}}

# Mail Configuration
spring.mail.host=${SPRING_MAIL_HOST:${MAIL_HOST}}
spring.mail.port=${SPRING_MAIL_PORT:${MAIL_PORT}}
spring.mail.username=${SPRING_MAIL_USERNAME:${MAIL_USERNAME}}
spring.mail.password=${SPRING_MAIL_PASSWORD:${MAIL_PASSWORD}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Production-ready Security and Error Handling Settings
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
logging.level.root=INFO
logging.level.com.example.jira=INFO
logging.level.org.springframework.web=INFO




